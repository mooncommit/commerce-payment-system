name: deploy.yml
on:
  push:
    branches:
      - master
      - feature-ci/cd

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar
        env:
          DB_URL: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
          DB_USERNAME: sa
          DB_PASSWORD: ""
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          JWT_SECRET: test-secret-key-test-secret-key-test-secret-key
          JWT_ACCESS_TOKEN_EXPIRATION: 3600000
          JWT_REFRESH_TOKEN_EXPIRATION: 604800000
          PORTONE_API_SECRET: test
          PORTONE_STORE_ID: test
          PORTONE_CHANNEL_KEY: test
      - name: Remove plain jar
        run: rm -f build/libs/*-plain.jar

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user"

      - name: Rename and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            JAR_FILE=$(find /home/ec2-user/build/libs -name "*.jar" ! -name "*plain.jar" | head -n 1)
            mv $JAR_FILE /home/ec2-user/app.jar
            rm -rf /home/ec2-user/build
            /home/ec2-user/deploy.sh


