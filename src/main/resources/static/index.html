<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상점 - 홈</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/index.html" class="nav-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                팔로우 커머스
            </a>
            <div class="nav-links" id="nav-right">
                <!-- app.js에서 렌더링 -->
            </div>
        </div>
    </nav>

    <main class="main-content container">
        <!-- Hero Section -->
        <div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-xl); overflow-x: auto; padding-bottom: var(--spacing-sm);">
            <div style="flex: 1; min-width: 300px; border-radius: var(--radius-lg); overflow: hidden;">
                <img src="/images/banner_digital.png" alt="Spring Sale" onerror="this.src='https://via.placeholder.com/600x250?text=Spring+Sale'" style="width: 100%; height: auto; display: block; object-fit: cover;">
            </div>
            <div style="flex: 1; min-width: 300px; border-radius: var(--radius-lg); overflow: hidden;">
                <img src="/images/banner_fashion.png" alt="New Arrivals" onerror="this.src='https://via.placeholder.com/600x250?text=New+Arrivals'" style="width: 100%; height: auto; display: block; object-fit: cover;">
            </div>
        </div>

        <div class="flex justify-between items-center mb-8">
            <h1>전체 상품</h1>
        </div>

        <div id="product-list" class="grid grid-products">
            <!-- 상품 목록이 렌더링 될 곳 -->
        </div>

        <div id="pagination" class="flex justify-center items-center gap-4 mt-8">
            <!-- 페이징 렌더링 -->
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        let currentPage = 0;

        async function loadProducts(page = 0) {
            try {
                // 백엔드 PageableDefault 사이즈 맞춤
                const res = await App.fetch(`/products?page=${page}&size=10`);
                if (res && res.data) {
                    renderProducts(res.data.content);
                    renderPagination(res.data);
                    currentPage = page;
                }
            } catch (error) {
                document.getElementById('product-list').innerHTML = `
                    <div class="empty-state">
                        상품을 불러오는 데 실패했습니다.
                    </div>
                `;
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('product-list');
            
            if (!products || products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                        <h3>등록된 상품이 없습니다.</h3>
                    </div>
                `;
                return;
            }

            container.innerHTML = products.map(product => {
                let imageUrl = '/images/prod_hoodie.png';
                if (product.name.includes('키보드')) imageUrl = '/images/prod_keyboard.png';
                if (product.name.includes('마우스')) imageUrl = '/images/banner_digital.png';
                if (product.name.includes('자켓')) imageUrl = '/images/prod_jacket.png';
                if (product.name.includes('사자')) imageUrl = '/images/lion_keyring.png';
                else if (product.name.includes('키링')) imageUrl = '/images/keyring.png';
                if (product.name.includes('헤드폰')) imageUrl = '/images/prod_headphone.png';

                return `
                <a href="/product.html?id=${product.productId}" class="card">
                    <div class="card-img-wrapper">
                        <img src="${imageUrl}" alt="${product.name}">
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${product.name}</h3>
                        <div class="card-price">${App.formatCurrency(product.price)}</div>
                        <p class="text-muted" style="font-size: 0.875rem;">잔여 재고: ${product.stockQuantity}개</p>
                    </div>
                </a>
            `}).join('');
        }

        function renderPagination(pageData) {
            const container = document.getElementById('pagination');
            if (pageData.totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            if (!pageData.first) {
                html += `<button class="btn btn-secondary" onclick="loadProducts(${pageData.number - 1})">이전</button>`;
            }
            
            html += `<span>${pageData.number + 1} / ${pageData.totalPages}</span>`;

            if (!pageData.last) {
                html += `<button class="btn btn-secondary" onclick="loadProducts(${pageData.number + 1})">다음</button>`;
            }

            container.innerHTML = html;
        }

        // 초기 로드
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts(0);
        });
    </script>
</body>
</html>
