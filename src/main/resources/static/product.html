<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상점 - 상품 상세</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/index.html" class="nav-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                팔로우 커머스
            </a>
            <div class="nav-links" id="nav-right">
                <!-- app.js에서 렌더링 -->
            </div>
        </div>
    </nav>

    <main class="main-content container">
        <div id="product-detail" class="grid md:grid-cols-2 gap-8" style="margin-top: var(--spacing-xl);">
            <!-- 상품 상세 렌더링 -->
            <div class="empty-state" style="grid-column: 1 / -1;">상품 정보를 불러오는 중...</div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let currentProduct = null;

        async function loadProduct() {
            if (!productId) {
                App.showToast('잘못된 접근입니다.', 'error');
                setTimeout(() => window.location.href = '/index.html', 1000);
                return;
            }

            try {
                const res = await App.fetch(`/products/${productId}`);
                if (res && res.data) {
                    currentProduct = res.data;
                    renderProduct(currentProduct);
                }
            } catch (error) {
                document.getElementById('product-detail').innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        상품을 불러오는 데 실패했습니다.
                    </div>
                `;
            }
        }

        function renderProduct(product) {
            const container = document.getElementById('product-detail');
            
            let imageUrl = '/images/prod_hoodie.png';
            if (product.name.includes('키보드')) imageUrl = '/images/prod_keyboard.png';
            if (product.name.includes('마우스')) imageUrl = '/images/banner_digital.png';
            if (product.name.includes('자켓')) imageUrl = '/images/prod_jacket.png';
            if (product.name.includes('사자')) imageUrl = '/images/lion_keyring.png';
            else if (product.name.includes('키링')) imageUrl = '/images/keyring.png';
            if (product.name.includes('헤드폰')) imageUrl = '/images/prod_headphone.png';

            container.innerHTML = `
                <div class="card-img-wrapper" style="border-radius: var(--radius-lg); border: 1px solid var(--border-color);">
                    <img src="${imageUrl}" alt="${product.name}" style="transform: none;">
                </div>
                <div class="flex" style="flex-direction: column; justify-content: center;">
                    <h1 style="margin-bottom: var(--spacing-sm);">${product.name}</h1>
                    <div class="card-price" style="font-size: 2rem; margin-bottom: var(--spacing-lg);">
                        ${App.formatCurrency(product.price)}
                    </div>
                    
                    <div class="mb-4">
                        <span class="badge ${product.stockQuantity > 0 ? 'badge-success' : 'badge-danger'}">
                            ${product.stockQuantity > 0 ? `재고: ${product.stockQuantity}개` : '품절'}
                        </span>
                    </div>

                    <div class="form-group mt-8">
                        <label class="form-label">수량</label>
                        <input type="number" id="order-quantity" class="form-control" value="1" min="1" max="${product.stockQuantity}" style="width: 100px;">
                    </div>

                    <div class="form-group">
                        <label class="form-label">사용할 포인트 (보유: <span id="user-points">확인중...</span>)</label>
                        <input type="number" id="use-points" class="form-control" value="0" min="0" style="width: 150px;">
                    </div>

                    <div class="mt-8 flex gap-4">
                        <button onclick="addToCart()" class="btn btn-secondary" style="flex: 1; padding: 1rem; font-size: 1.125rem;" ${product.stockQuantity === 0 ? 'disabled' : ''}>
                            장바구니 담기
                        </button>
                        <button onclick="createOrder()" class="btn btn-primary" style="flex: 1; padding: 1rem; font-size: 1.125rem;" ${product.stockQuantity === 0 ? 'disabled' : ''}>
                            바로 구매하기
                        </button>
                    </div>
                </div>
            `;

            loadUserPoints();
        }

        async function loadUserPoints() {
            if (!App.token) {
                document.getElementById('user-points').innerText = '로그인 필요';
                return;
            }
            try {
                // 포인트 조회 API
                const res = await App.fetch('/points');
                if (res && res.data) {
                    const point = res.data.totalPoint || res.data.point || 0;
                    document.getElementById('user-points').innerText = App.formatCurrency(point);
                    document.getElementById('use-points').max = point;
                }
            } catch (e) {
                document.getElementById('user-points').innerText = '0원';
            }
        }

        async function createOrder() {
            if (!App.token) {
                App.showToast('로그인이 필요합니다.', 'error');
                window.location.href = '/login.html';
                return;
            }

            const quantity = parseInt(document.getElementById('order-quantity').value, 10);
            const usePointAmount = parseInt(document.getElementById('use-points').value, 10) || 0;

            if (quantity < 1 || quantity > currentProduct.stockQuantity) {
                App.showToast('수량이 올바르지 않습니다.', 'error');
                return;
            }

            try {
                // 주문 생성 (결제 대기 상태)
                const res = await App.fetch('/orders', {
                    method: 'POST',
                    body: JSON.stringify({
                        productId: currentProduct.productId,
                        quantity: quantity,
                        usePointAmount: usePointAmount
                    })
                });

                if (res && res.data) {
                    const orderId = res.data.orderId;
                    App.showToast('주문서가 생성되었습니다. 결제 페이지로 이동합니다.');
                    setTimeout(() => window.location.href = `/payment.html?orderId=${orderId}`, 1000);
                }
            } catch (error) {
                App.showToast(error.message || '주문 생성에 실패했습니다.', 'error');
            }
        }

        async function addToCart() {
            if (!App.token) {
                App.showToast('로그인이 필요합니다.', 'error');
                window.location.href = '/login.html';
                return;
            }

            const quantity = parseInt(document.getElementById('order-quantity').value, 10);

            if (quantity < 1 || quantity > currentProduct.stockQuantity) {
                App.showToast('수량이 올바르지 않습니다.', 'error');
                return;
            }

            try {
                const res = await App.fetch('/carts', {
                    method: 'POST',
                    body: JSON.stringify({
                        productId: currentProduct.productId,
                        quantity: quantity
                    })
                });

                if (res) {
                    App.showToast('장바구니에 상품을 담았습니다.');
                }
            } catch (error) {
                App.showToast(error.message || '장바구니 담기에 실패했습니다.', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProduct();
        });
    </script>
</body>
</html>
