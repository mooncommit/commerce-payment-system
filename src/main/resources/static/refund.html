<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 취소 - Follow Commerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page-container">
        <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 24px;">결제 취소 (환불)</h2>
        
        <div class="card" style="padding: 24px; max-width: 600px; margin: 0 auto;">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">주문 번호</label>
                <input type="text" id="orderId" class="input-field" readonly style="background-color: #f8f9fa;">
            </div>

            <div style="margin-bottom: 24px;">
                <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">취소 사유</label>
                <input type="text" id="reason" class="input-field" placeholder="예: 단순 변심" required>
            </div>

            <button id="btnRefund" class="btn-black" style="width: 100%; padding: 16px; font-size: 16px;">결제 취소 요청</button>
        </div>
    </main>

    <script src="app.js"></script>
    <script src="refund.js"></script>
</body>
</html>
