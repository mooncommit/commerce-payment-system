<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상점 - 로그인</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/index.html" class="nav-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                팔로우 커머스
            </a>
            <div class="nav-links" id="nav-right">
                <!-- app.js에서 렌더링 -->
            </div>
        </div>
    </nav>

    <main class="main-content container flex" style="align-items: center; justify-content: center;">
        <div class="card" style="width: 100%; max-width: 400px; padding: var(--spacing-xl);">
            <div id="login-section">
                <h2 class="text-center mb-8">로그인</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="login-email">이메일</label>
                        <input type="email" id="login-email" class="form-control" required placeholder="user@example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="login-password">비밀번호</label>
                        <input type="password" id="login-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block mt-4">로그인</button>
                    <p class="text-center mt-4 text-muted" style="font-size: 0.875rem;">
                        계정이 없으신가요? <a href="#" onclick="toggleSection('signup'); return false;">회원가입</a>
                    </p>
                </form>
            </div>

            <div id="signup-section" style="display: none;">
                <h2 class="text-center mb-8">회원가입</h2>
                <form id="signup-form">
                    <div class="form-group">
                        <label class="form-label" for="signup-name">이름</label>
                        <input type="text" id="signup-name" class="form-control" required placeholder="홍길동">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signup-email">이메일</label>
                        <input type="email" id="signup-email" class="form-control" required placeholder="user@example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signup-phone">전화번호</label>
                        <input type="tel" id="signup-phone" class="form-control" required placeholder="010-1234-5678" pattern="010-[0-9]{4}-[0-9]{4}">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signup-password">비밀번호</label>
                        <input type="password" id="signup-password" class="form-control" required minlength="8" placeholder="8자리 이상">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block mt-4">가입하기</button>
                    <p class="text-center mt-4 text-muted" style="font-size: 0.875rem;">
                        이미 계정이 있으신가요? <a href="#" onclick="toggleSection('login'); return false;">로그인</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        function toggleSection(section) {
            document.getElementById('login-section').style.display = section === 'login' ? 'block' : 'none';
            document.getElementById('signup-section').style.display = section === 'signup' ? 'block' : 'none';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await App.fetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });

                if (res && res.data && res.data.accessToken) {
                    App.setToken(res.data.accessToken);
                    App.showToast('로그인 성공!');
                    setTimeout(() => window.location.href = '/index.html', 1000);
                }
            } catch (error) {
                App.showToast(error.message || '로그인에 실패했습니다.', 'error');
            }
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const phoneNumber = document.getElementById('signup-phone').value;

            try {
                await App.fetch('/auth/signup', {
                    method: 'POST',
                    body: JSON.stringify({ name, email, password, phoneNumber })
                });

                App.showToast('회원가입이 완료되었습니다. 로그인해주세요.');
                toggleSection('login');
                document.getElementById('login-email').value = email;
            } catch (error) {
                App.showToast(error.message || '회원가입에 실패했습니다.', 'error');
            }
        });

        // 이미 로그인 된 경우 홈으로
        if (App.token) {
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
