<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 - Follow Commerce</title>
    <link rel="stylesheet" href="styles.css">
    <!-- PortOne V2 SDK -->
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
</head>
<body>
    <main class="page-container">
        <div style="background-color: #f8f9fa; min-height: 100vh; padding-bottom: 60px;">
            <div style="background-color: #212529; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-weight: 700; font-size: 18px;">Follow Commerce</span>
                    <span style="background-color: #fd7e14; color: white; font-size: 12px; padding: 4px 8px; border-radius: 4px; font-weight: 600;">PortOne 결제창</span>
                </div>
                <a href="/index.html" style="font-size: 14px; cursor: pointer; color: #adb5bd; text-decoration: none;">쇼핑몰로 돌아가기</a>
            </div>

            <div style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
                <div style="background-color: #fff3cd; border: 1px solid #ffe69c; border-radius: 8px; padding: 20px; margin-bottom: 24px;">
                    <h3 style="color: #664d03; font-size: 16px; font-weight: 700; margin-bottom: 8px;">Follow Commerce 주문 결제</h3>
                    <p style="color: #664d03; font-size: 14px; margin: 0;">
                        쇼핑몰 주문 생성 응답으로 결제 정보가 자동 입력되었습니다. 결제창 열기 버튼을 누르면 PortOne 결제가 진행되고, 성공 후 서버 결제 확정 API까지 호출됩니다.
                    </p>
                </div>

                <div class="card" style="margin-bottom: 24px;">
                    <div style="padding: 16px 20px; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="width: 24px; height: 24px; background-color: #fd7e14; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700;">1</div>
                            <span style="font-weight: 700; font-size: 16px;">주문 생성 응답값 확인</span>
                        </div>
                    </div>
                    <div style="padding: 20px;">
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">포트원 결제 ID</label>
                            <input type="text" id="portonePaymentId" class="input-field" readonly>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">결제 금액 (원)</label>
                            <input type="text" id="pgAmount" class="input-field" readonly>
                        </div>
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">주문명</label>
                            <input type="text" id="orderName" class="input-field" readonly>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-bottom: 32px;">
                    <div style="padding: 16px 20px; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="width: 24px; height: 24px; background-color: #fd7e14; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700;">2</div>
                            <span style="font-weight: 700; font-size: 16px;">결제자 정보</span>
                        </div>
                    </div>
                    <div style="padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">이름</label>
                            <input type="text" id="buyerName" class="input-field">
                        </div>
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">이메일</label>
                            <input type="email" id="buyerEmail" class="input-field">
                        </div>
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">연락처</label>
                            <input type="tel" id="buyerPhone" class="input-field" value="010-0000-0000">
                        </div>
                    </div>
                </div>

                <div id="errorBox" style="display: none; background-color: #fff; border: 1px solid #f5c2c7; border-radius: 8px; margin-bottom: 24px; overflow: hidden;">
                    <div id="errorTitle" style="background-color: #f8d7da; padding: 12px 20px; font-weight: 700; color: #842029; display: flex; align-items: center; gap: 8px;">
                    </div>
                    <div id="errorRawDataContainer" style="padding: 20px; display: none;">
                        <div style="font-size: 13px; font-weight: 600; color: #495057; margin-bottom: 12px;">▼ 오류 응답 보기 (개발자용 로그)</div>
                        <pre id="errorRawData" style="margin: 0; padding: 16px; background-color: #212529; color: #e9ecef; border-radius: 6px; font-size: 13px; overflow-x: auto; font-family: monospace;"></pre>
                    </div>
                </div>

                <button id="btnPayment" style="width: 100%; background-color: #fd7e14; color: white; border: none; padding: 18px; font-size: 18px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: opacity 0.2s;">
                    결제창 열기 →
                </button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const orderDataRaw = sessionStorage.getItem('checkoutOrderData');
            if (!orderDataRaw) {
                alert('잘못된 접근입니다.');
                window.location.href = '/index.html';
                return;
            }

            const orderData = JSON.parse(orderDataRaw);
            document.getElementById('portonePaymentId').value = orderData.portonePaymentId;
            document.getElementById('pgAmount').value = orderData.pgAmount;
            document.getElementById('orderName').value = `주문번호: ${orderData.orderNumber}`;

            try {
                const profile = await fetchApi('/member/me');
                if (profile) {
                    document.getElementById('buyerName').value = profile.name || '';
                    document.getElementById('buyerEmail').value = profile.email || '';
                    if (profile.phoneNumber) {
                        document.getElementById('buyerPhone').value = profile.phoneNumber;
                    }
                }
            } catch (e) {
                console.warn('Profile load failed');
            }

            const btnPayment = document.getElementById('btnPayment');
            const errorBox = document.getElementById('errorBox');
            const errorTitle = document.getElementById('errorTitle');
            const errorRawDataContainer = document.getElementById('errorRawDataContainer');
            const errorRawData = document.getElementById('errorRawData');

            function showError(message, rawData = null) {
                errorBox.style.display = 'block';
                errorTitle.innerHTML = `<span>❌</span> ${message}`;
                if (rawData) {
                    errorRawDataContainer.style.display = 'block';
                    errorRawData.innerText = JSON.stringify(rawData, null, 2);
                } else {
                    errorRawDataContainer.style.display = 'none';
                }
            }

            // fetch .env variables injected by Spring Boot or use placeholders
            // To make it simple since we removed Vite, we might need an endpoint to get keys, 
            // but for now, we'll try to fetch from a meta tag or hardcode them if it's purely static.
            // Wait, the backend doesn't serve env variables to static files easily unless we use a controller.
            // Let's create an API endpoint to fetch them or hardcode them as a fallback.
            let STORE_ID = 'store-7770fc01-602d-4716-b0c4-e52ba5fb1697';
            let CHANNEL_KEY = 'channel-key-3eec4563-60e7-46b0-b6d3-53e7bdbec726';

            // Check if we can fetch keys from backend
            try {
                const config = await fetchApi('/config/portone');
                if (config && config.storeId) {
                    STORE_ID = config.storeId;
                    CHANNEL_KEY = config.channelKey;
                } else {
                    throw new Error("PortOne 설정 정보가 올바르지 않습니다.");
                }
            } catch (e) {
                console.error("Could not fetch portone config from backend:", e);
                showError("포트원 설정 정보를 서버에서 불러오지 못했습니다. 결제를 진행할 수 없습니다. (오류: " + (e.message || e) + ")");
                btnPayment.disabled = true;
                btnPayment.innerText = '결제 설정 오류';
            }

            btnPayment.addEventListener('click', async () => {
                btnPayment.disabled = true;
                btnPayment.innerText = '처리 중...';
                errorBox.style.display = 'none';

                try {
                    if (orderData.pgAmount === 0) {
                        await fetchApi('/payments/confirm', {
                            method: 'POST',
                            body: JSON.stringify({ paymentId: orderData.paymentId, portonePaymentId: orderData.portonePaymentId })
                        });
                        alert('전액 포인트로 결제가 완료되었습니다.');
                        window.location.href = '/index.html';
                        return;
                    }

                    const response = await window.PortOne.requestPayment({
                        storeId: STORE_ID,
                        channelKey: CHANNEL_KEY,
                        paymentId: orderData.portonePaymentId,
                        orderName: `주문번호: ${orderData.orderNumber}`,
                        totalAmount: orderData.pgAmount,
                        currency: 'CURRENCY_KRW',
                        payMethod: 'CARD',
                        customer: {
                            email: document.getElementById('buyerEmail').value,
                            fullName: document.getElementById('buyerName').value,
                            phoneNumber: document.getElementById('buyerPhone').value,
                        }
                    });

                    if (response.code != null || response.error != null || !response.paymentId) {
                        showError(`결제 실패: ${response.message || '사용자가 결제를 취소했거나 알 수 없는 오류가 발생했습니다.'}`, response);
                        btnPayment.disabled = false;
                        btnPayment.innerText = '결제창 열기 →';
                        return;
                    }

                    await fetchApi('/payments/confirm', {
                        method: 'POST',
                        body: JSON.stringify({ paymentId: orderData.paymentId, portonePaymentId: response.paymentId || orderData.portonePaymentId })
                    });
                    
                    alert('결제가 성공적으로 완료되었습니다!');
                    window.location.href = '/index.html';

                } catch (err) {
                    showError(err.message || '오류가 발생했습니다.');
                    btnPayment.disabled = false;
                    btnPayment.innerText = '결제창 열기 →';
                }
            });
        });
    </script>
</body>
</html>
